apiVersion: v2
name: retry-endpoint
description: BSV multicast retry endpoint — caches frames and retransmits on NACK
type: application
version: 0.2.5
# appVersion MUST equal a tag published on ghcr.io/lightwebinc/retry-endpoint
# (the chart's tag:"" default pulls this). Images are published manually via the
# binary repo's image-publish.yml workflow; bump appVersion ONLY in lockstep with
# an image publish — binary git tags (v1.4.x) are NOT image tags until published.
appVersion: "1.4.6"
kubeVersion: ">= 1.27.0-0"
keywords:
  - bitcoin
  - bsv
  - multicast
  - brc-124
  - brc-126
  - brc-128
home: https://github.com/lightwebinc/retry-endpoint
sources:
  - https://github.com/lightwebinc/retry-endpoint
  - https://github.com/lightwebinc/retry-endpoint-helm
maintainers:
  - name: lightwebinc
    url: https://github.com/lightwebinc
icon: https://raw.githubusercontent.com/lightwebinc/bsv-multicast/main/.assets/icon.png
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: NACK proxying config (proxyEnabled, upstreamRetryEndpoints, proxy tuning)
    - kind: added
      description: config.egressIface (retransmission egress iface, defaults separately from mcIface) + orchestrated-edge example
    - kind: added
      description: config.egressMulticastLoop / config.egressHoplimit (collapsed-node multicast egress)
