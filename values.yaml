# Default values for retry-endpoint.
# Every binary flag is exposed under .config; advanced ones empty/disabled by default.

replicaCount: 1

image:
  repository: ghcr.io/lightwebinc/retry-endpoint
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}
# Matches the distroless/static:nonroot image (uid 65532). Enforces nonroot even if
# the image is overridden. NET_ADMIN is granted below at the container level, which is
# compatible with running as nonroot.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Multicast ingress + egress on dedicated fabric NIC requires NET_ADMIN.
securityContext:
  capabilities:
    add: ["NET_ADMIN"]

networking:
  mode: multus
  multus:
    networkName: mcast-fabric
    namespace: bsv-mcast
    fabricIPv6: ""
    interface: net1
  host:
    dnsPolicy: ClusterFirstWithHostNet

# Full surface — every flag in retry-endpoint/config/config.go.
config:
  # Ingress (multicast receive)
  mcIface: "eth0"
  listenPort: 9001
  shardBits: 2          # standardized at 2 across all charts and binary default
  mcScope: "site"
  mcGroupId: "0x000B"

  # SSM (RFC 4607). See bsv-multicast/docs/SourceSpecificMulticast.
  # sourceMode "ssm" requires at least one of ssmBootstrap.* or
  # ssmPublishersStatic. retry-endpoint also EMITS NACK-discovery beacons,
  # so set bindSource to the per-pod IPv6 from Multus/Whereabouts. SSM
  # listeners pre-declare retry-endpoints in sources.bootstrap.beacon
  # against this address.
  sourceMode: "ssm"
  bindSource: ""
  ssmBootstrap:
    manifest: []
    beacon: []
    subtreeAnnounce: []
  ssmPublishersStatic: []
  ssmBootstrapRefresh: "30s"

  # Egress (retransmission)
  egressIface: "eth0"   # comma-separated allowed
  egressPort: 9001
  dedupWindow: "60s"

  # NACK proxying (cross-domain recovery). When enabled, a cache miss is
  # recovered from an upstream retry-endpoint and re-served into this domain.
  # See bsv-multicast/docs/brc-126-retransmission-protocol.md.
  proxyEnabled: false
  upstreamRetryEndpoints: []   # host:port list; REQUIRED when proxyEnabled
  proxyTimeout: "300ms"
  proxyMaxEndpoints: 0         # 0 = all upstreams
  proxyDedupWindow: "60s"
  proxyWorkers: 4
  proxyQueue: 1024

  # NACK server
  nackPort: 9300
  # nackAddr is REQUIRED in containerized deployments. The binary will
  # auto-detect from the egress interface if unset, but the detected SLAAC
  # address may mismatch what listeners trust (per their RETRY_ENDPOINTS).
  # Set explicitly to the pod's fabric IPv6 (no CIDR suffix).
  nackAddr: ""
  nackWorkers: 0        # 0 = NumCPU

  # Cache — modular shard-common/cache backend.
  # See bsv-multicast/docs/ModularCacheBackend/modular-cache-backend.md
  cacheBackend: "memory"  # memory | redis | aerospike
  redisAddr: ""           # required when cacheBackend=redis (Redis/Valkey/Dragonfly); cross-instance dedup with memory backend
  # Aerospike Community Edition (required when cacheBackend=aerospike).
  # TTL granularity is whole seconds, floor 1s — all frame TTLs satisfy this.
  # The namespace must be provisioned on the cluster.
  aerospikeHosts: ""              # comma-separated host:port (e.g. "aero-0:3000,aero-1:3000")
  aerospikeNamespace: "cache"
  aerospikeSet: "bre"
  cacheDialTimeout: "1s"  # backend dial timeout
  cacheOpTimeout: "1s"    # backend per-operation timeout (fail-open on exceed)
  cacheTtl: "60s"
  cacheTtlTx: "60s"
  cacheTtlBlock: "10m"
  cacheTtlSubtree: "5m"
  cacheTtlAnchor: "2m"
  cacheMaxKeys: 0

  # Rate limits
  rlIpRate: 100
  rlIpBurst: 10
  rlChainRate: 500
  rlChainWindow: "1m"
  rlSequenceMax: 100
  rlSequenceWindow: "1m"
  rlGroupRate: 200
  rlGroupBurst: 50

  # Beacon (BRC-126) ADVERT multicast
  beaconEnabled: true
  beaconTier: 0
  beaconPreference: 128
  beaconInterval: "60s"
  beaconScope: "site"     # link | site | org | global | both | all
  beaconFlagsUnicast: false
  beaconFlagsMulticast: true
  beaconFlagsDraining: false

  # Response suppression
  suppressAck: false
  suppressMiss: false

  # BRC-132 subtree data
  subtreeDataEnabled: false

  # Runtime
  drainTimeout: "0s"
  debug: false  # deprecated alias for logLevel=debug
  # Unified logging — see bsv-multicast/docs/UnifiedLogging/unified-logging-plan.md
  logFormat: "text"   # text (stderr) | json (stdout, for fleet aggregation)
  logLevel: "info"    # debug|info|warn|error; runtime-togglable via POST /loglevel + SIGHUP
  traceSampling: 0    # 0..1 trace head sampling (0 = off; exports via otlpEndpoint; control-plane only)

  # Observability
  metricsAddr: ":9400"
  instanceId: ""
  otlpEndpoint: ""
  otlpInterval: "30s"

service:
  type: ClusterIP
  metricsPort: 9400

metrics:
  enabled: true
  path: /metrics
  port: 9400
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    relabelings: []
    metricRelabelings: []

probes:
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# Recovery component (frame cache + NACK serving / retransmit, cache-backend backed).
# Lighter datapath than proxy/listener but cache lookups dominate; size memory to
# your resend window. Conservative starting points — tune against your own load.
# Empty ({}) yields BestEffort QoS and no admission control.
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
topologySpreadConstraints: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false
  ingressFrom: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

extraEnv: []
